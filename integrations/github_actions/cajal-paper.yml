name: CAJAL Paper Generation

on:
  workflow_dispatch:
    inputs:
      topic:
        description: 'Research topic for paper generation'
        required: true
        default: 'Machine learning for climate prediction'
      format:
        description: 'Output format'
        required: true
        default: 'markdown'
        type: choice
        options:
          - markdown
          - latex
          - pdf

jobs:
  generate-paper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Ollama
        uses: ollama/setup-ollama@v1
        with:
          model: llama3.1
          
      - name: Setup CAJAL
        run: |
          pip install cajal-p2pclaw
          ollama create cajal -f ./integrations/ollama/Modelfile
          
      - name: Generate Paper
        run: |
          python -c "
          from cajal_p2pclaw import PaperGenerator
          gen = PaperGenerator(model='cajal')
          paper = gen.generate('${{ github.event.inputs.topic }}')
          with open('output/paper.md', 'w') as f:
            f.write(paper)
          print('Paper generated successfully')
          "
          
      - name: Upload Paper
        uses: actions/upload-artifact@v4
        with:
          name: generated-paper
          path: output/paper.md
          
      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          files: output/paper.md
          tag_name: paper-${{ github.run_number }}
          body: |
            Automated paper generation for: ${{ github.event.inputs.topic }}
            Generated by CAJAL (P2PCLAW Research Network)
