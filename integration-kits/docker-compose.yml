version: '3.8'
services:
  cajal-server:
    image: agnuxo1/cajal-server:latest
    ports:
      - "8000:8000"
    environment:
      - MODEL_ID=Agnuxo/CAJAL-4B-P2PCLAW
      - MAX_TOKENS=262144
    volumes:
      - cajal-models:/root/.cache/huggingface
    restart: unless-stopped
    
volumes:
  cajal-models:
